<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prototype carte 2 niveaux macro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui,sans-serif; background: #f5f0e8; padding: 24px; }
.page-sim { max-width: 860px; margin: 0 auto; background: white; border-radius: 16px; padding: 32px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
.dest-tabs { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
.dest-tab { padding: 6px 14px; border-radius: 8px; border: 1.5px solid #e8e0d0; background: white; font-size: 13px; font-weight: 600; cursor: pointer; color: #555; }
.dest-tab.active { background: #1a1f2e; color: white; border-color: #1a1f2e; }
.map-section { display: flex; gap: 20px; align-items: flex-start; }
.map-col { flex: 0 0 260px; display: flex; flex-direction: column; gap: 6px; }
.map-card { border-radius: 12px; overflow: hidden; border: 1.5px solid #e8e0d0; position: relative; }
.map-card-label {
  position: absolute; top: 8px; left: 8px; z-index: 1000;
  background: rgba(255,255,255,.92); border-radius: 6px;
  padding: 2px 8px; font-size: 10px; font-weight: 700;
  color: #1a1f2e; letter-spacing: .3px; pointer-events: none;
  text-transform: uppercase;
}
/* Niveau 1 : planisphère — plus haut pour bien voir le globe */
.map-el-world  { height: 150px; width: 100%; display: block; }
/* Niveau 2 : continental — un peu plus haut, on voit le contexte */
.map-el-macro  { height: 165px; width: 100%; display: block; }
.map-credit { font-size: 9px; color: #aaa; padding: 2px 8px; background: #faf7f2; border-top: 1px solid #f0ebe0; }
.dest-intro { flex: 1; min-width: 0; }
.dest-intro h1 { font-size: 22px; font-weight: 800; color: #1a1f2e; margin-bottom: 6px; }
.country-tag { display: inline-block; background: #f0ebe0; color: #5a4a3a; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-bottom: 14px; }
.dest-intro p { font-size: 14px; color: #555; line-height: 1.6; }
.coords { margin-top: 10px; font-size: 11px; color: #bbb; font-family: monospace; }
.leaflet-control-attribution { font-size: 8px !important; }
.leaflet-control-zoom { display: none !important; }
</style>
</head>
<body>
<div class="page-sim">
  <div class="dest-tabs">
    <div class="dest-tab active" onclick="load('marrakech',this)">🇲🇦 Marrakech</div>
    <div class="dest-tab" onclick="load('borabora',this)">🇵🇫 Bora Bora</div>
    <div class="dest-tab" onclick="load('tokyo',this)">🇯🇵 Tokyo</div>
    <div class="dest-tab" onclick="load('reykjavik',this)">🇮🇸 Reykjavik</div>
    <div class="dest-tab" onclick="load('nairobi',this)">🇰🇪 Nairobi</div>
  </div>

  <div class="map-section">
    <div class="map-col">
      <!-- Niveau 1 : planisphère complet -->
      <div class="map-card">
        <div class="map-card-label">🌍 Monde</div>
        <div class="map-el-world" id="map-world"></div>
      </div>
      <!-- Niveau 2 : continental (dezoomé, contexte géographique) -->
      <div class="map-card">
        <div class="map-card-label" id="macro-label">🔍 Contexte</div>
        <div class="map-el-macro" id="map-macro"></div>
        <div class="map-credit">© OpenStreetMap contributors</div>
      </div>
    </div>

    <div class="dest-intro">
      <h1 id="dest-title">Marrakech</h1>
      <span class="country-tag" id="dest-tag"></span>
      <p id="dest-text"></p>
      <div class="coords" id="dest-coords"></div>
    </div>
  </div>
</div>

<script>
var DESTS = {
  marrakech: {
    lat:31.63, lon:-8.0,
    worldZoom:1,   // planisphère — on voit tout le globe
    macroZoom:3,   // Maghreb + Europe du Sud + Atlantique
    macroLabel:'🔍 Maghreb & Méditerranée',
    title:'Marrakech',
    tag:'🇲🇦 Maroc · Afrique du Nord',
    text:'Marrakech bénéficie d\'un climat semi-aride avec des étés chauds et des hivers doux. Avec <strong>3 300h de soleil par an</strong>, c\'est l\'une des destinations les plus ensoleillées du Maghreb.<br><br>Meilleur mois : <strong>avril</strong> — 26°C, 18% de pluie.',
  },
  borabora: {
    lat:-16.5, lon:-151.74,
    worldZoom:1,
    macroZoom:3,   // Pacifique Sud — on voit Tahiti + îles voisines + Australie
    macroLabel:'🔍 Pacifique Sud',
    title:'Bora Bora',
    tag:'🇵🇫 Polynésie française · Pacifique',
    text:'Bora Bora est un atoll volcanique au <strong>cœur du Pacifique Sud</strong>, à 250 km de Tahiti. Son lagon turquoise en fait l\'une des îles les plus isolées — et spectaculaires — du monde.<br><br>Meilleure saison : <strong>mai–octobre</strong> — saison sèche, 27°C.',
  },
  tokyo: {
    lat:35.69, lon:139.69,
    worldZoom:1,
    macroZoom:3,   // Japon + Corée + Chine + mer du Japon
    macroLabel:'🔍 Asie de l\'Est',
    title:'Tokyo',
    tag:'🇯🇵 Japon · Asie de l\'Est',
    text:'Tokyo est la capitale du Japon, sur l\'île de <strong>Honshū</strong>, entre la mer du Japon et l\'océan Pacifique. Mégapole de 14 millions d\'habitants au climat humide subtropical.<br><br>Meilleur mois : <strong>octobre</strong> — 22°C, feuillages, peu de pluie.',
  },
  reykjavik: {
    lat:64.13, lon:-21.93,
    worldZoom:1,
    macroZoom:3,   // Islande + Atlantique Nord + Groenland + Europe du Nord
    macroLabel:'🔍 Atlantique Nord',
    title:'Reykjavik',
    tag:'🇮🇸 Islande · Atlantique Nord',
    text:'Reykjavik est la capitale la plus septentrionale du monde, sur l\'île volcanique d\'Islande, <strong>à mi-chemin entre l\'Europe et l\'Amérique du Nord</strong>.<br><br>Meilleure période : <strong>juin–août</strong> — soleil de minuit, 12°C.',
  },
  nairobi: {
    lat:-1.29, lon:36.82,
    worldZoom:1,
    macroZoom:3,   // Kenya + Tanzanie + Ethiopie + Océan Indien
    macroLabel:'🔍 Afrique de l\'Est',
    title:'Nairobi',
    tag:'🇰🇪 Kenya · Afrique de l\'Est',
    text:'Nairobi est la capitale du Kenya, à <strong>1 800m d\'altitude à l\'équateur</strong> — ce qui lui confère un climat doux toute l\'année malgré sa position tropicale.<br><br>Meilleure période : <strong>juillet–septembre</strong> — grande migration du Masai Mara.',
  },
};

var mWorld=null, mMacro=null, wPin=null, wRect=null, mPin=null;

function pin(){
  return L.divIcon({
    html:'<div style="width:10px;height:10px;background:#e44;border-radius:50%;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,.5)"></div>',
    iconSize:[10,10],iconAnchor:[5,5],className:''
  });
}

function initMaps(d){
  var dd=DESTS[d];

  // ── Niveau 1 : planisphère ──
  if(!mWorld){
    mWorld=L.map('map-world',{
      zoomControl:false,scrollWheelZoom:false,
      doubleClickZoom:false,dragging:false,
      attributionControl:false,
      worldCopyJump:false
    }).setView([dd.lat,dd.lon],dd.worldZoom);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(mWorld);
  } else {
    mWorld.setView([dd.lat,dd.lon],dd.worldZoom,{animate:true,duration:.7});
  }
  if(wPin) mWorld.removeLayer(wPin);
  if(wRect) mWorld.removeLayer(wRect);
  // Rectangle de localisation légèrement plus grand que le zoom macro
  var delta=18;
  wRect=L.rectangle([[dd.lat-delta,dd.lon-delta*1.8],[dd.lat+delta,dd.lon+delta*1.8]],
    {color:'#e44',weight:1.5,fillColor:'#e44',fillOpacity:.1,interactive:false}).addTo(mWorld);
  wPin=L.marker([dd.lat,dd.lon],{icon:pin(),interactive:false}).addTo(mWorld);

  // ── Niveau 2 : continental / macro ──
  document.getElementById('macro-label').textContent=dd.macroLabel;
  if(!mMacro){
    mMacro=L.map('map-macro',{
      zoomControl:false,scrollWheelZoom:false,
      doubleClickZoom:false,dragging:false,  // non-interactif = pas de rebond
      attributionControl:true
    }).setView([dd.lat,dd.lon],dd.macroZoom);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© <a href="https://openstreetmap.org">OSM</a>',maxZoom:18
    }).addTo(mMacro);
  } else {
    mMacro.setView([dd.lat,dd.lon],dd.macroZoom,{animate:true,duration:.7});
  }
  if(mPin) mMacro.removeLayer(mPin);
  mPin=L.marker([dd.lat,dd.lon],{icon:pin(),interactive:false}).addTo(mMacro);
}

function load(d,tab){
  document.querySelectorAll('.dest-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  var dd=DESTS[d];
  document.getElementById('dest-title').textContent=dd.title;
  document.getElementById('dest-tag').textContent=dd.tag;
  document.getElementById('dest-text').innerHTML=dd.text;
  document.getElementById('dest-coords').textContent=
    Math.abs(dd.lat).toFixed(2)+'°'+(dd.lat>=0?'N':'S')+' · '+
    Math.abs(dd.lon).toFixed(2)+'°'+(dd.lon>=0?'E':'O');
  setTimeout(()=>initMaps(d),50);
}

window.addEventListener('load',()=>load('marrakech',document.querySelector('.dest-tab')));
</script>
</body>
</html>
