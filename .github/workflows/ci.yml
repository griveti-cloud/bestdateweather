name: CI – Lint & Validate

on:
  push:
    branches: [main]
    paths:
      - 'js/**'
      - 'index.html'
      - 'en/app.html'
      - 'generate_pages.py'
      - 'scoring.py'
      - 'data/**'
      - 'locales/**'
      - 'tests/**'
      - 'scripts/**'
  pull_request:
    branches: [main]

jobs:
  js-lint:
    name: JS Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JS syntax
        run: |
          echo "=== Checking JS syntax ==="
          for f in js/core.js js/weather-banner-2.js js/fiche-slugs.js js/fiche-scores.js \
                   js/i18n-fr.js js/i18n-en.js js/i18n-en-us.js js/i18n-es.js js/i18n-de.js; do
            [ -f "$f" ] && node --check "$f" && echo "  ✓ $f"
          done
          echo "✅ All JS files pass syntax check"

      - name: Install ESLint
        run: npm install eslint@8 --no-save

      - name: Run ESLint
        run: |
          npx eslint js/core.js js/weather-banner-2.js \
                     js/i18n-fr.js js/i18n-en.js js/i18n-en-us.js js/i18n-es.js js/i18n-de.js

  html-validate:
    name: HTML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check critical HTML elements
        run: |
          echo "=== index.html ==="
          grep -q 'lang="fr"' index.html || { echo "❌ Missing lang=fr"; exit 1; }
          grep -q 'meta name="description"' index.html || { echo "❌ Missing meta description"; exit 1; }
          grep -q 'viewport' index.html || { echo "❌ Missing viewport"; exit 1; }
          grep -q 'hreflang' index.html || { echo "❌ Missing hreflang"; exit 1; }
          grep -q 'src="js/core.min.js' index.html || grep -q 'src="js/core.js' index.html || { echo "❌ core.js not loaded"; exit 1; }
          grep -q 'src="js/i18n-fr.min.js' index.html || grep -q 'src="js/i18n-fr.js' index.html || { echo "❌ i18n-fr.js not loaded"; exit 1; }
          echo "✅ index.html OK"

          echo "=== en/app.html ==="
          grep -q 'lang="en"' en/app.html || { echo "❌ Missing lang=en"; exit 1; }
          grep -q 'meta name="description"' en/app.html || { echo "❌ Missing meta description"; exit 1; }
          grep -q 'canonical' en/app.html || { echo "❌ Missing canonical"; exit 1; }
          grep -q 'hreflang' en/app.html || { echo "❌ Missing hreflang"; exit 1; }
          echo "✅ en/app.html OK"

      - name: Check no inline JS > 1KB in app pages
        run: |
          python3 -c "
          import re
          for fname in ['index.html', 'en/app.html']:
              with open(fname) as f:
                  html = f.read()
              blocks = re.findall(r'<script(?! src)[^>]*>(.*?)</script>', html, re.DOTALL)
              big = [b for b in blocks if len(b.strip()) > 1024]
              if big:
                  print(f'⚠️  {fname}: {len(big)} inline JS block(s) > 1KB ({[len(b) for b in big]} bytes)')
              else:
                  print(f'✅ {fname}: no large inline JS')
          "

  generators-check:
    name: Python Generators
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate CSV data files
        run: |
          python3 -c "
          import csv, sys
          errors = []

          with open('data/destinations.csv', encoding='utf-8-sig') as f:
              rows = list(csv.DictReader(f))
          print(f'destinations.csv: {len(rows)} rows')

          warnings = []
          for r in rows:
              slug = r['slug_fr']
              for lang in ['fr', 'en']:
                  if not r.get(f'hero_sub_{lang}', '').strip():
                      errors.append(f'  Missing hero_sub_{lang}: {slug}')
              for lang in ['es', 'de']:
                  if not r.get(f'hero_sub_{lang}', '').strip():
                      warnings.append(f'  Missing hero_sub_{lang}: {slug}')
          if warnings:
              print(f'  Warning: {len(warnings)} missing hero_sub_es/de (non-blocking)')

          with open('data/cards.csv', encoding='utf-8-sig') as f:
              cards = list(csv.DictReader(f))
          slugs_with_cards = set(c['slug'] for c in cards)
          dest_slugs = set(r['slug_fr'] for r in rows)
          missing_cards = dest_slugs - slugs_with_cards
          print(f'cards.csv: {len(cards)} cards for {len(slugs_with_cards)} destinations')
          if missing_cards:
              print(f'  ⚠️  {len(missing_cards)} destinations without FR cards (non-blocking)')

          if errors:
              print('\n❌ ERRORS:')
              for e in errors:
                  print(e)
              sys.exit(1)
          else:
              print('\n✅ All data files valid')
          "

      - name: Check Python generators syntax
        run: |
          for f in generate_pages.py generate_classements.py generate_piliers.py \
                   generate_comparatifs.py generate_sitemaps.py scoring.py \
                   lib/common.py lib/page_config.py; do
            python3 -c "import py_compile; py_compile.compile('$f', doraise=True)" && echo "  ✓ $f"
          done
          echo "✅ Python generators compile OK"

      - name: Check locale consistency
        run: |
          python3 scripts/check_locale.py

  scoring-tests:
    name: Scoring Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scoring consistency tests
        run: python3 tests/test_scoring.py


  minified-sync:
    name: JS Minified Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install terser
        run: npm install terser --no-save

      - name: Check source/min.js sync
        run: |
          echo "=== Checking source ↔ min.js sync ==="
          FAIL=0
          for src in js/core.js js/weather-banner-2.js js/fiche-slugs.js; do
            min="${src%.js}.min.js"
            [ -f "$src" ] || continue
            [ -f "$min" ] || { echo "❌ Missing: $min"; FAIL=1; continue; }
            # Regenerate min from source and compare size/hash
            npx terser "$src" --compress --mangle -o /tmp/check_min.js 2>/dev/null
            orig_size=$(wc -c < "$min")
            regen_size=$(wc -c < /tmp/check_min.js)
            orig_hash=$(sha256sum "$min" | cut -d' ' -f1)
            regen_hash=$(sha256sum /tmp/check_min.js | cut -d' ' -f1)
            if [ "$orig_hash" != "$regen_hash" ]; then
              pct_diff=$(python3 -c "print(abs($regen_size-$orig_size)*100//$regen_size)")
              if [ "$pct_diff" -gt 5 ]; then
                echo "❌ $min is out of sync with $src (size diff: ${pct_diff}%)"
                FAIL=1
              else
                echo "⚠️  $min differs from regen but within 5% tolerance (minifier version drift)"
              fi
            else
              echo "  ✓ $min in sync"
            fi
          done
          [ "$FAIL" -eq 0 ] || exit 1
          echo "✅ All .min.js files in sync"

  sitemap-check:
    name: Sitemap Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify sitemap coverage
        run: |
          python3 -c "
          import re, glob, sys

          # Sitemaps actifs (priority + secondary), URLs SANS .html (worker sert sans extension)
          def load_sitemap_urls(pattern):
              urls = set()
              for sm in glob.glob(pattern):
                  content = open(sm).read()
                  urls |= set(re.findall(r'<loc>https://bestdateweather\.com/([^<]*)</loc>', content))
              return urls

          fr_urls = load_sitemap_urls('sitemap-fr-*.xml')
          en_urls = load_sitemap_urls('sitemap-en-*.xml')

          # Les fichiers sont .html sur disque mais les URLs sitemap sont sans extension
          def to_url(filename):
              return filename[:-5] if filename.endswith('.html') else filename

          errors = []
          for f in sorted(glob.glob('meilleure-periode-*.html'))[:50]:
              with open(f, 'r') as fh:
                  head = fh.read(500)
                  if 'meta http-equiv=\"refresh\"' in head or 'noindex' in head:
                      continue
              if to_url(f) not in fr_urls:
                  errors.append(f'Missing from sitemap-fr: {to_url(f)}')

          for f in sorted(glob.glob('en/best-time-to-visit-*.html'))[:50]:
              with open(f, 'r') as fh:
                  head = fh.read(500)
                  if 'meta http-equiv=\"refresh\"' in head or 'noindex' in head:
                      continue
              if to_url(f) not in en_urls:
                  errors.append(f'Missing from sitemap-en: {to_url(f)}')

          if errors:
              for e in errors[:20]:
                  print(f'FAIL {e}')
              sys.exit(1)
          else:
              print(f'Sitemap coverage OK (FR: {len(fr_urls)} URLs, EN: {len(en_urls)} URLs)')
          "
