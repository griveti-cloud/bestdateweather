name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — VALIDATION (bloque le déploiement si un bug structurel est détecté)
  # ════════════════════════════════════════════════════════════════════════════
  # check_deploy.py vérifie notamment (ajouté juin 2026 après les bugs de session) :
  #   - 0 lien .html interne (anti "Page avec redirection" / 307 en masse)
  #   - markers V6 présents (anti-régression V5->V6 silencieuse)
  #   - canonical sans .html, cohérent avec l'URL servie
  #   - sitemaps sans .html, sans noindex, sans doublon
  #   - cohérence sécurité (classement combine FR/DE avec Math.max)
  #   - cohérence scoring CSV <-> pages, emojis, dewpoint
  # Si check_deploy.py exit != 0, le job deploy ne tourne PAS.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node (pour validation JS inline des piliers)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run structural validation (check_deploy.py)
        run: |
          set -e
          echo "=== Validation structurelle pre-deploiement ==="
          python3 check_deploy.py
          echo "Validation reussie -- deploiement autorise"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — DEPLOY (ne tourne QUE si validate réussit)
  # ════════════════════════════════════════════════════════════════════════════
  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler@4.77.0

      - name: Deploy to Cloudflare Workers Assets
        run: |
          set -e
          DELAYS=(60 120 180 300 480 600 600)
          for i in 1 2 3 4 5 6 7 8; do
            if wrangler deploy; then
              echo "Deploy succeeded on attempt $i"
              exit 0
            fi
            if [ $i -eq 8 ]; then
              echo "Deploy failed after 8 attempts"
              exit 1
            fi
            DELAY=${DELAYS[$((i-1))]}
            echo "Attempt $i failed, retrying in ${DELAY}s..."
            sleep $DELAY
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b41738c7ecde63202108d350cd786f4b

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 — SMOKE TEST PROD (vérifie que le site déployé est sain)
  # ════════════════════════════════════════════════════════════════════════════
  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Wait for CF propagation
        run: sleep 60

      - name: Smoke test production
        run: python3 smoke_test_prod.py
