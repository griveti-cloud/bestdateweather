name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler@4.77.0

      - name: Deploy to Cloudflare Workers Assets
        run: |
          set -e
          # Backoff exponentiel pour résister aux blips CF API (504 sur assets-upload-session)
          # 8 attempts avec délais 60s -> 120s -> 180s -> 300s -> 480s -> 600s -> 600s -> stop
          # Total max : ~40min de fenêtre de retry pour traverser un blip
          DELAYS=(60 120 180 300 480 600 600)
          for i in 1 2 3 4 5 6 7 8; do
            if wrangler deploy; then
              echo "✅ Deploy succeeded on attempt $i"
              exit 0
            fi
            if [ $i -eq 8 ]; then
              echo "❌ Deploy failed after 8 attempts"
              exit 1
            fi
            DELAY=${DELAYS[$((i-1))]}
            echo "⚠️  Attempt $i failed, retrying in ${DELAY}s..."
            sleep $DELAY
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b41738c7ecde63202108d350cd786f4b
