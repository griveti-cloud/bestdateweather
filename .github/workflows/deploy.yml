name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler@4.77.0

      - name: Deploy to Cloudflare Workers Assets
        run: |
          set -e
          for i in 1 2 3 4 5; do
            if wrangler deploy; then
              echo "✅ Deploy succeeded on attempt $i"
              exit 0
            fi
            echo "⚠️  Attempt $i failed, retrying in 30s..."
            sleep 30
          done
          echo "❌ Deploy failed after 5 attempts"
          exit 1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b41738c7ecde63202108d350cd786f4b
