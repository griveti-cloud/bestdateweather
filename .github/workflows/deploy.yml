name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler 4.77.0
        run: npm install -g wrangler@4.77.0

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy . --project-name=bestdateweather-prod --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b41738c7ecde63202108d350cd786f4b
