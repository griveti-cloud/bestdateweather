<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Debug Favoris</title>
<style>body{font-family:monospace;padding:20px;background:#1a1f2e;color:#fff}
.ok{color:#16a34a}.err{color:#ef4444}.info{color:#d97706}
pre{background:#0f172a;padding:12px;border-radius:8px;word-break:break-all;white-space:pre-wrap}
button{background:#d97706;color:white;border:none;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;margin:8px 4px}
</style>
</head>
<body>
<h2>🔧 Debug Favoris BDW</h2>
<div id="out"></div>
<button onclick="runTests()">Lancer les tests</button>
<button onclick="clearAll()">Effacer localStorage</button>
<button onclick="location.href='meilleure-periode-paris.html'">→ Page Paris</button>

<script src="js/core.min.js?v=14"></script>
<script>
function log(msg, cls) {
  document.getElementById('out').innerHTML += '<p class="' + (cls||'') + '">' + msg + '</p>';
}

function runTests() {
  document.getElementById('out').innerHTML = '';
  
  // Test 1 : fonctions disponibles
  log('=== FONCTIONS ===');
  log('bdwToggleFav: ' + typeof window.bdwToggleFav, typeof window.bdwToggleFav === 'function' ? 'ok' : 'err');
  log('bdwShowFavorites: ' + typeof window.bdwShowFavorites, typeof window.bdwShowFavorites === 'function' ? 'ok' : 'err');
  log('bdwShowEmailPopup: ' + typeof window.bdwShowEmailPopup, typeof window.bdwShowEmailPopup === 'function' ? 'ok' : 'err');
  
  // Test 2 : localStorage
  log('=== LOCALSTORAGE ===');
  try {
    localStorage.setItem('bdw_test', '1');
    localStorage.removeItem('bdw_test');
    log('localStorage: OK', 'ok');
  } catch(e) { log('localStorage: ERREUR - ' + e, 'err'); }
  
  var favs = localStorage.getItem('bdw_favorites');
  log('bdw_favorites: ' + (favs || 'vide'), favs ? 'info' : '');
  log('bdw_email_asked: ' + (localStorage.getItem('bdw_email_asked') || 'vide'));
  
  // Test 3 : simuler un clic favori
  log('=== TEST TOGGLE ===');
  if (typeof window.bdwToggleFav === 'function') {
    var fakeBtn = document.createElement('button');
    fakeBtn.setAttribute('data-slug', 'paris-test');
    fakeBtn.innerHTML = '<svg><path d="M12 21"/></svg>';
    try {
      window.bdwToggleFav(fakeBtn);
      var after = JSON.parse(localStorage.getItem('bdw_favorites') || '{}');
      log('Toggle OK — paris-test dans favs: ' + !!after['paris-test'], after['paris-test'] ? 'ok' : 'err');
      // Nettoyage
      delete after['paris-test'];
      localStorage.setItem('bdw_favorites', JSON.stringify(after));
    } catch(e) { log('Toggle ERREUR: ' + e, 'err'); }
  }
  
  // Test 4 : popup email
  log('=== TEST POPUP EMAIL ===');
  if (typeof window.bdwShowEmailPopup === 'function') {
    localStorage.removeItem('bdw_email_asked');
    log('Flag email effacé — test popup dans 1s...', 'info');
    setTimeout(function() {
      window.bdwShowEmailPopup('Paris');
      log('Popup lancé — visible ?', 'info');
    }, 1000);
  }
}

function clearAll() {
  localStorage.removeItem('bdw_favorites');
  localStorage.removeItem('bdw_email_asked');
  log('localStorage nettoyé', 'ok');
}
</script>
</body>
</html>
