var MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var MF=['January','February','March','April','May','June','July','August','September','October','November','December'];
function sc(s){return s>=8.6?'#1a7a4a':s>=7.6?'#2d9e60':s>=6.3?'#84cc16':s>=5?'#f59e0b':s>=3.5?'#f97316':'#ef4444';}
function flag(c){try{return c.toUpperCase().split('').map(function(x){return String.fromCodePoint(x.charCodeAt(0)+127397)}).join('');}catch(e){return '🌍';}}

var map=L.map('map',{center:[20,10],zoom:2,minZoom:2,maxZoom:8,zoomControl:true,attributionControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:'© CartoDB'}).addTo(map);
L.control.attribution({position:'bottomright'}).addTo(map);

var layer=L.layerGroup().addTo(map);
var cur=new Date().getMonth();

function render(mi){
  layer.clearLayers();
  var best=0;
  DATA.forEach(function(d){
    var s=d.s[mi]; if(s===null||s===undefined)return;
    if(s>best)best=s;
    var sz=s>=7?10:s>=5?8:6;
    var col=sc(s);
    var icon=L.divIcon({
      className:'',
      html:'<div class="bdw-dot" style="width:'+sz+'px;height:'+sz+'px;background:'+col+';opacity:'+(0.5+s/20)+'"></div>',
      iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]
    });
    var mk=L.marker([d.lat,d.lon],{icon:icon,zIndexOffset:Math.round(s*10)});
    mk.on('click',function(){
      var maxS=Math.max.apply(null,d.s.filter(function(x){return x!==null;}));
      var bars=d.s.map(function(ms,i){
        var h=ms!==null?Math.round((ms/10)*100):0;
        var c=ms!==null?sc(ms):'#333';
        return '<div class="pi-bar'+(i===mi?' cur':'')+'" style="height:'+h+'%;background:'+c+'" title="'+MN[i]+': '+(ms||'—')+'"></div>';
      }).join('');
      var href='/en/best-time-to-visit-'+(d.slug_en||'') +'.html';
      L.popup({maxWidth:210})
        .setLatLng([d.lat,d.lon])
        .setContent('<div class="pi"><div class="pi-flag">'+flag(d.f)+'</div><div class="pi-name">'+d.n+'</div><div class="pi-score" style="color:'+sc(s)+'">'+s.toFixed(1)+'<span style="font-size:13px;color:#5a6c7d">/10</span></div><div class="pi-month">'+MF[mi]+'</div><div class="pi-bars">'+bars+'</div><a href="'+href+'" class="pi-link">View climate →</a></div>')
        .openOn(map);
    });
    mk.addTo(layer);
  });
  document.getElementById('sc').textContent=layer.getLayers().length;
  document.getElementById('sb').textContent=best>0?best.toFixed(1):'—';
}

var tabs=document.getElementById('mtabs');
MN.forEach(function(m,i){
  var b=document.createElement('button');
  b.className='mtab'+(i===cur?' on':'');
  b.textContent=m;
  b.onclick=function(){
    document.querySelectorAll('.mtab').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');cur=i;render(i);map.closePopup();
  };
  tabs.appendChild(b);
});
render(cur);
</script>
