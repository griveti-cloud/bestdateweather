<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prototype carte 2 niveaux — BestDateWeather</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui,sans-serif; background: #f5f0e8; padding: 24px; }
.page-sim { max-width: 860px; margin: 0 auto; background: white; border-radius: 16px; padding: 32px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }

/* ── Destination switcher ── */
.dest-tabs { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
.dest-tab { padding: 6px 14px; border-radius: 8px; border: 1.5px solid #e8e0d0; background: white; font-size: 13px; font-weight: 600; cursor: pointer; color: #555; }
.dest-tab.active { background: #1a1f2e; color: white; border-color: #1a1f2e; }

/* ── Main layout: map left, intro right ── */
.map-section { display: flex; gap: 20px; align-items: flex-start; }

/* ── Map column with 2 levels ── */
.map-col { flex: 0 0 260px; display: flex; flex-direction: column; gap: 6px; }

.map-card {
  border-radius: 12px;
  overflow: hidden;
  border: 1.5px solid #e8e0d0;
  position: relative;
}
.map-card-label {
  position: absolute;
  top: 8px;
  left: 8px;
  z-index: 1000;
  background: rgba(255,255,255,.92);
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 10px;
  font-weight: 700;
  color: #1a1f2e;
  letter-spacing: .3px;
  pointer-events: none;
  text-transform: uppercase;
}
.map-el-world { height: 120px; width: 100%; display: block; }
.map-el-region { height: 160px; width: 100%; display: block; }

.map-credit {
  font-size: 9px;
  color: #aaa;
  padding: 2px 8px;
  background: #faf7f2;
  border-top: 1px solid #f0ebe0;
}

/* ── Intro column ── */
.dest-intro { flex: 1; min-width: 0; }
.dest-intro h1 { font-size: 22px; font-weight: 800; color: #1a1f2e; margin-bottom: 6px; }
.country-tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: #f0ebe0; color: #5a4a3a;
  font-size: 12px; font-weight: 600;
  padding: 3px 10px; border-radius: 20px;
  margin-bottom: 14px;
}
.dest-intro p { font-size: 14px; color: #555; line-height: 1.6; }
.coords {
  margin-top: 12px;
  font-size: 11px;
  color: #aaa;
  font-family: monospace;
}

/* Leaflet cleanup */
.leaflet-control-attribution { font-size: 8px !important; }
.leaflet-control-zoom { display: none !important; }
</style>
</head>
<body>
<div class="page-sim">

  <div class="dest-tabs">
    <div class="dest-tab active" onclick="loadDest('marrakech',this)">🇲🇦 Marrakech</div>
    <div class="dest-tab" onclick="loadDest('borabora',this)">🇵🇫 Bora Bora</div>
    <div class="dest-tab" onclick="loadDest('tokyo',this)">🇯🇵 Tokyo</div>
    <div class="dest-tab" onclick="loadDest('reykjavik',this)">🇮🇸 Reykjavik</div>
    <div class="dest-tab" onclick="loadDest('nairobi',this)">🇰🇪 Nairobi</div>
  </div>

  <div class="map-section">
    <!-- Map column -->
    <div class="map-col">
      <div class="map-card">
        <div class="map-card-label">🌍 Monde</div>
        <div class="map-el-world" id="map-world"></div>
      </div>
      <div class="map-card">
        <div class="map-card-label" id="region-label">🔍 Région</div>
        <div class="map-el-region" id="map-region"></div>
        <div class="map-credit">© OpenStreetMap contributors</div>
      </div>
    </div>

    <!-- Intro column -->
    <div class="dest-intro">
      <h1 id="dest-title">Marrakech</h1>
      <span class="country-tag" id="dest-tag">🇲🇦 Maroc · Afrique du Nord</span>
      <p id="dest-text"></p>
      <div class="coords" id="dest-coords"></div>
    </div>
  </div>

</div>

<script>
var DESTS = {
  marrakech: {
    lat: 31.63, lon: -8.0,
    worldZoom: 2, regionZoom: 6,
    title: 'Marrakech',
    tag: '🇲🇦 Maroc · Afrique du Nord',
    regionLabel: '🔍 Maghreb',
    text: 'Marrakech bénéficie d\'un climat semi-aride avec des étés chauds et des hivers doux. Avec <strong>3 300h de soleil par an</strong>, c\'est l\'une des destinations les plus ensoleillées du Maghreb.<br><br>Le meilleur mois : <strong>avril</strong> — 26°C, 18% de risque de pluie.',
  },
  borabora: {
    lat: -16.5, lon: -151.74,
    worldZoom: 1, regionZoom: 8,
    title: 'Bora Bora',
    tag: '🇵🇫 Polynésie française · Pacifique',
    regionLabel: '🔍 Polynésie',
    text: 'Bora Bora est un atoll volcanique du Pacifique Sud, à <strong>250 km au nord-ouest de Tahiti</strong>. Son lagon turquoise en fait l\'une des îles les plus spectaculaires du monde.<br><br>Meilleure saison : <strong>mai à octobre</strong> — saison sèche, 27°C.',
  },
  tokyo: {
    lat: 35.69, lon: 139.69,
    worldZoom: 2, regionZoom: 6,
    title: 'Tokyo',
    tag: '🇯🇵 Japon · Asie de l\'Est',
    regionLabel: '🔍 Archipel japonais',
    text: 'Tokyo, mégapole de 14 millions d\'habitants, est la capitale du Japon. Située sur l\'île de Honshū, elle bénéficie d\'un <strong>climat humide subtropical</strong>.<br><br>Le meilleur mois : <strong>octobre</strong> — 22°C, feuillages d\'automne, peu de pluie.',
  },
  reykjavik: {
    lat: 64.13, lon: -21.93,
    worldZoom: 2, regionZoom: 5,
    title: 'Reykjavik',
    tag: '🇮🇸 Islande · Atlantique Nord',
    regionLabel: '🔍 Islande',
    text: 'Reykjavik est la capitale la plus septentrionale du monde, sur l\'île volcanique d\'Islande, à mi-chemin entre <strong>l\'Europe et l\'Amérique du Nord</strong>.<br><br>Meilleure période : <strong>juin–août</strong> — soleil de minuit, 12°C.',
  },
  nairobi: {
    lat: -1.29, lon: 36.82,
    worldZoom: 2, regionZoom: 5,
    title: 'Nairobi',
    tag: '🇰🇪 Kenya · Afrique de l\'Est',
    regionLabel: '🔍 Afrique de l\'Est',
    text: 'Nairobi est la capitale du Kenya, à <strong>1 800m d\'altitude</strong> à l\'équateur — ce qui lui confère un climat doux toute l\'année. Point de départ idéal pour les safaris dans le Masai Mara.<br><br>Meilleure période : <strong>juillet–septembre</strong> — grande migration.',
  },
};

var mapWorld = null, mapRegion = null;
var currentPin = null;

function makePin() {
  return L.divIcon({
    html: '<div style="width:12px;height:12px;background:#e55;border-radius:50%;border:2.5px solid white;box-shadow:0 2px 8px rgba(0,0,0,.5)"></div>',
    iconSize: [12,12], iconAnchor: [6,6], className: ''
  });
}

// Small red rectangle on world map to show region extent
function makeRegionRect(lat, lon) {
  var delta = 8;
  return L.rectangle(
    [[lat - delta, lon - delta*1.5], [lat + delta, lon + delta*1.5]],
    {color: '#e55', weight: 1.5, fillColor: '#e55', fillOpacity: 0.12, interactive: false}
  );
}

var worldRect = null, worldPin = null, regionPin = null;

function initMaps(dest) {
  var d = DESTS[dest];

  if (!mapWorld) {
    mapWorld = L.map('map-world', {
      zoomControl: false, scrollWheelZoom: false,
      doubleClickZoom: false, dragging: false,
      attributionControl: false
    }).setView([d.lat, d.lon], d.worldZoom);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom: 18}).addTo(mapWorld);
  }

  if (!mapRegion) {
    mapRegion = L.map('map-region', {
      zoomControl: false, scrollWheelZoom: false,
      doubleClickZoom: false, dragging: true,
      attributionControl: true
    }).setView([d.lat, d.lon], d.regionZoom);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://openstreetmap.org">OSM</a>', maxZoom: 18
    }).addTo(mapRegion);
  }

  // Update world map
  mapWorld.setView([d.lat, d.lon], d.worldZoom, {animate: true, duration: 0.8});
  if (worldRect) mapWorld.removeLayer(worldRect);
  if (worldPin) mapWorld.removeLayer(worldPin);
  worldRect = makeRegionRect(d.lat, d.lon).addTo(mapWorld);
  worldPin = L.marker([d.lat, d.lon], {icon: makePin(), interactive: false}).addTo(mapWorld);

  // Update region map
  mapRegion.setView([d.lat, d.lon], d.regionZoom, {animate: true, duration: 0.8});
  if (regionPin) mapRegion.removeLayer(regionPin);
  regionPin = L.marker([d.lat, d.lon], {icon: makePin(), interactive: false}).addTo(mapRegion);
}

function loadDest(dest, tab) {
  var d = DESTS[dest];
  document.querySelectorAll('.dest-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');

  document.getElementById('dest-title').textContent = d.title;
  document.getElementById('dest-tag').textContent = d.tag;
  document.getElementById('dest-text').innerHTML = d.text;
  document.getElementById('dest-coords').textContent =
    d.lat.toFixed(2) + '° ' + (d.lat >= 0 ? 'N' : 'S') + ' · ' +
    Math.abs(d.lon).toFixed(2) + '° ' + (d.lon >= 0 ? 'E' : 'O');
  document.getElementById('region-label').textContent = d.regionLabel;

  setTimeout(() => initMaps(dest), 50);
}

window.addEventListener('load', () => loadDest('marrakech', document.querySelector('.dest-tab')));
</script>
</body>
</html>
